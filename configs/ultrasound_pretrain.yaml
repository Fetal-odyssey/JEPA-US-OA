# Configuration pré-entraînement I-JEPA — JEPA-US-OA
# Auteur : Olivier Ami — 2026

model:
  architecture: IJEPA
  encoder: vit_base_patch16_224
  encoder_weights: imagenet
  predictor_depth: 6
  predictor_embed_dim: 384
  predictor_heads: 12

data:
  dataset: FETAL_PLANES_DB
  img_size: 224
  batch_size: 64
  num_workers: 4

masking:
  n_masks_target: 4
  mask_scale: [0.15, 0.2]
  mask_ratio: 0.75

training:
  optimizer: AdamW
  lr: 1.5e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  n_epochs: 50
  warmup_epochs: 5
  scheduler: cosine
  ema_momentum: 0.996
  amp: true
  dtype: bfloat16
  grad_clip: 1.0
